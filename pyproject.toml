[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-npu-audio-enhancer"
version = "0.1.0"
description = "Prototype audio enhancement chain for Snapdragon X NPU assisted playback."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "Cursor Automation" }]

[project.scripts]
snapdragon-audio-enhance = "snapdragon_npu_audio_enhancer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
