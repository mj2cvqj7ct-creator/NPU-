[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-audio-enhancer"
version = "0.1.0"
description = "Streaming audio enhancement pipeline for Snapdragon X ARM64 PCs."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Cursor Automation" }]
license = { text = "MIT" }
keywords = ["audio", "snapdragon", "npu", "qnn", "dsp"]
dependencies = [
  "numpy>=1.24",
]

[project.optional-dependencies]
onnx = [
  "onnxruntime>=1.17",
]
dev = [
  "pytest>=8",
]

[project.scripts]
snapdragon-audio-enhance = "snapdragon_audio_enhancer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
