[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-npu-audio"
version = "0.1.0"
description = "Local audio enhancement core for Snapdragon X NPU assisted streaming playback."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }

[tool.setuptools.packages.find]
where = ["src"]
