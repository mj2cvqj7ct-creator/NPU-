[project]
name = "snapdragon-x-npu-audio-enhancer"
version = "0.1.0"
description = "Prototype DSP and NPU routing core for Snapdragon X audio enhancement."
readme = "README.md"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"
