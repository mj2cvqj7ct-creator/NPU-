[project]
name = "snapdragon-npu-audio-enhancer"
version = "0.1.0"
description = "Prototype audio enhancement pipeline for Snapdragon X ARM64 NPU assisted playback"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Cursor Automation" }]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
