[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-npu-audio-enhancer"
version = "0.1.0"
description = "Prototype system-wide audio enhancement pipeline for Snapdragon X ARM64 PCs."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Cursor Automation" }
]
dependencies = []

[project.optional-dependencies]
npu = ["onnxruntime"]

[project.scripts]
snapdragon-audio-enhance = "snapdragon_npu_audio_enhancer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
