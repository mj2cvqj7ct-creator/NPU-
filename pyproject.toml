[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-npu-audio-enhancer"
version = "0.1.0"
description = "Offline prototype for a Snapdragon X NPU-assisted system-wide audio enhancer."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Cursor Automation" }]
license = { text = "MIT" }

[project.scripts]
snapdragon-audio-enhance = "snapdragon_npu_audio_enhancer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
