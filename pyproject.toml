[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-x-npu-audio-enhancer"
version = "0.1.0"
description = "Low-latency PCM enhancement core for Snapdragon X NPU assisted music playback."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Cursor Automation" }]

[tool.setuptools.packages.find]
where = ["src"]
