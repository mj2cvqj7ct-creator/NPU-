[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-npu-audio-enhancer"
version = "0.1.0"
description = "Prototype DSP and Snapdragon X NPU inference pipeline for system-wide streaming audio enhancement."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Cursor Automation" }]
dependencies = ["numpy"]

[project.scripts]
npu-audio-enhance = "npu_audio_enhancer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
