[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-npu-audio-enhancer"
version = "0.1.0"
description = "Prototype audio enhancement pipeline for Snapdragon X NPU assisted playback"
requires-python = ">=3.10"

[project.scripts]
snapdragon-audio-enhance = "snapdragon_audio_enhancer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
