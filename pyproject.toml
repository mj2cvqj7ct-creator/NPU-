[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "snapdragon-x-npu-audio-enhancer"
version = "0.1.0"
description = "Low-latency audio enhancement pipeline scaffolding for ARM64 Snapdragon X NPU PCs."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
