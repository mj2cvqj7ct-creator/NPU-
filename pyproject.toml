[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "npu-audio-enhancer"
version = "0.1.0"
description = "CPU-verifiable audio enhancement prototype for Snapdragon X NPU targets."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Cursor Agent" }]

[project.scripts]
npu-audio-enhancer = "npu_audio_enhancer.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
