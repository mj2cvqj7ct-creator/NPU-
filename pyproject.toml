[project]
name = "sxnpu-audio-enhancer"
version = "0.1.0"
description = "Snapdragon X NPU-aware system audio enhancement prototype"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Cursor Automation" }]
dependencies = [
  "numpy>=2.0",
]

[project.optional-dependencies]
onnx = [
  "onnxruntime>=1.18",
]
dev = [
  "pytest>=8.0",
]

[project.scripts]
sxnpu-enhance-wav = "sxnpu_audio_enhancer.cli:main"

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
